version: '3.8'

services:

  # ─────────────────────────────────────────────
  # BDD Globale (nœud coordinateur)
  # ─────────────────────────────────────────────
  eshop-global:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop_global
    hostname: eshop-global
    environment:
      ORACLE_PWD: EshopGlobal_2026
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"       # SQL*Net
      - "5500:5500"       # Enterprise Manager Express
    volumes:
      - eshop_global_data:/opt/oracle/oradata
      - ./sql/global:/docker-entrypoint-initdb.d
    networks:
      eshop_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/EshopGlobal_2026@//localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Site 1 — Gros volumes (Entrepôt central)
  # ─────────────────────────────────────────────
  eshop-site1:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop_site1
    hostname: eshop-site1
    environment:
      ORACLE_PWD: EshopSite1_2026
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
      - "5501:5500"
    volumes:
      - eshop_site1_data:/opt/oracle/oradata
      - ./sql/site1:/docker-entrypoint-initdb.d
    networks:
      eshop_net:
        ipv4_address: 172.20.0.11
    depends_on:
      eshop-global:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/EshopSite1_2026@//localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Site 2 — Petits volumes (Magasins de proximité)
  # ─────────────────────────────────────────────
  eshop-site2:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: eshop_site2
    hostname: eshop-site2
    environment:
      ORACLE_PWD: EshopSite2_2026
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1523:1521"
      - "5502:5500"
    volumes:
      - eshop_site2_data:/opt/oracle/oradata
      - ./sql/site2:/docker-entrypoint-initdb.d
    networks:
      eshop_net:
        ipv4_address: 172.20.0.12
    depends_on:
      eshop-global:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/EshopSite2_2026@//localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # SQL Developer Web (interface graphique)
  # ─────────────────────────────────────────────
  sqldev-web:
    image: container-registry.oracle.com/database/ords:latest
    container_name: eshop_sqldev_web
    environment:
      ORACLE_HOST: eshop-global
      ORACLE_PORT: 1521
      ORACLE_SERVICE: XEPDB1
      ORACLE_PWD: EshopGlobal_2026
      ORDS_PWD: OrdsAdmin_2026
    ports:
      - "8080:8080"
    networks:
      eshop_net:
        ipv4_address: 172.20.0.20
    depends_on:
      eshop-global:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────────
# Volumes persistants
# ─────────────────────────────────────────────
volumes:
  eshop_global_data:
    name: eshop_global_data
  eshop_site1_data:
    name: eshop_site1_data
  eshop_site2_data:
    name: eshop_site2_data

# ─────────────────────────────────────────────
# Réseau dédié
# ─────────────────────────────────────────────
networks:
  eshop_net:
    name: eshop_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
