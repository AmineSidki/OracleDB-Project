version: "3.8"

# ================================================================
# EShop Distributed Database - Docker Swarm Stack
#
# Node layout:
#   MANAGER (partner's PC - 16GB) : oracle-global + oracle-site2
#   WORKER  (your MacBook - 8GB)  : oracle-site1
#
# Deploy with:
#   docker stack deploy -c docker-stack.yml eshop
# ================================================================

services:

  # ------------------------------------------------------------------
  # Global DB  — full EShop schema, triggers route writes to sites
  # Hosted on: Partner's PC (Manager node)
  # ------------------------------------------------------------------
  oracle-global:
    image: gvenzl/oracle-xe:21-slim
    hostname: oracle-global
    environment:
      ORACLE_PASSWORD: Oracle_2024!
      APP_USER: eshop
      APP_USER_PASSWORD: Eshop_2024!
    volumes:
      - global-data:/opt/oracle/oradata
      - type: bind
        source: ./init-global
        target: /container-entrypoint-initdb.d
        read_only: true
      - type: bind
        source: ./eshop-data
        target: /e-shop-data
        read_only: true
    ports:
      - target: 1521
        published: 1521
        protocol: tcp
        mode: host
    networks:
      - eshop-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 60s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -S eshop/Eshop_2024!@//localhost/XEPDB1 <<< 'SELECT 1 FROM DUAL;' | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ------------------------------------------------------------------
  # Site 1  — Fragment: QUANTITE >= 100  (gros volumes / entrepôt)
  # Hosted on: Your MacBook (Worker node)
  # ------------------------------------------------------------------
  oracle-site1:
    image: gvenzl/oracle-xe:21-slim
    hostname: oracle-site1
    environment:
      ORACLE_PASSWORD: Oracle_2024!
      APP_USER: eshop
      APP_USER_PASSWORD: Eshop_2024!
    volumes:
      - site1-data:/opt/oracle/oradata
      - type: bind
        source: ./init-site1
        target: /container-entrypoint-initdb.d
        read_only: true
    ports:
      - target: 1521
        published: 1522
        protocol: tcp
        mode: host
    networks:
      - eshop-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 60s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -S eshop/Eshop_2024!@//localhost/XEPDB1 <<< 'SELECT 1 FROM DUAL;' | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ------------------------------------------------------------------
  # Site 2  — Fragment: QUANTITE < 100  (détail / magasins)
  # Hosted on: Partner's PC (Manager node)
  # ------------------------------------------------------------------
  oracle-site2:
    image: gvenzl/oracle-xe:21-slim
    hostname: oracle-site2
    environment:
      ORACLE_PASSWORD: Oracle_2024!
      APP_USER: eshop
      APP_USER_PASSWORD: Eshop_2024!
    volumes:
      - site2-data:/opt/oracle/oradata
      - type: bind
        source: ./init-site2
        target: /container-entrypoint-initdb.d
        read_only: true
    ports:
      - target: 1521
        published: 1523
        protocol: tcp
        mode: host
    networks:
      - eshop-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 60s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -S eshop/Eshop_2024!@//localhost/XEPDB1 <<< 'SELECT 1 FROM DUAL;' | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

# ================================================================
# Persistent volumes — local to the node the service is pinned to
# ================================================================
volumes:
  global-data:
    driver: local
  site1-data:
    driver: local
  site2-data:
    driver: local

# ================================================================
# Overlay network — spans both machines transparently
# attachable: true allows manual sqlplus connections for debugging
# ================================================================
networks:
  eshop-net:
    driver: overlay
    attachable: true
