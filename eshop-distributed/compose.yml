services:

  global_db:
    build:
      context: ./global_db
    container_name: eshop_global_db
    environment:
      ORACLE_PWD: oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - global_db_data:/opt/oracle/oradata
      - ./global_db/init:/container-entrypoint-initdb.d
    networks:
      - eshop_net
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/oracle123@localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  site1_db:
    build:
      context: ./site1_db
    container_name: eshop_site1_db
    environment:
      ORACLE_PWD: oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
      - "5501:5500"
    volumes:
      - site1_db_data:/opt/oracle/oradata
    networks:
      - eshop_net
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/oracle123@localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  site2_db:
    build:
      context: ./site2_db
    container_name: eshop_site2_db
    environment:
      ORACLE_PWD: oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1523:1521"
      - "5502:5500"
    volumes:
      - site2_db_data:/opt/oracle/oradata
    networks:
      - eshop_net
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/oracle123@localhost:1521/XEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  global_db_data:
  site1_db_data:
  site2_db_data:

networks:
  eshop_net:
    driver: bridge
